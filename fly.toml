# fly.toml — configuração do deploy no Fly.io
# Documentação: https://fly.io/docs/reference/configuration/

# IMPORTANTE: altere "torre-obscura" para o nome do seu app no Fly.io
# (o nome deve ser globalmente único — use: fly apps create <nome>)
app = "torre-obscura"
primary_region = "gru"  # São Paulo — região mais próxima do Brasil

[build]
  dockerfile = "Dockerfile"

[env]
  PORT     = "8080"
  NODE_ENV = "production"
  # Não coloque segredos aqui!
  # Use: fly secrets set DATABASE_URL="postgresql://..." SESSION_SECRET="..."

[http_service]
  internal_port        = 8080
  force_https          = true
  auto_stop_machines   = true
  auto_start_machines  = true
  min_machines_running = 0

  [http_service.concurrency]
    type       = "connections"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  memory   = "512mb"
  cpu_kind = "shared"
  cpus     = 1
