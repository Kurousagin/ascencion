openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: alianca
    description: Aliança assíncrona entre jogadoras (identidade, pareamento e trocas)
  - name: guerra
    description: Guerra entre cidadelas — descoberta de rivais (cidadelas-bot)
  - name: pioneer
    description: Marcos globais (os 10 Pioneiros que desbloqueiam a Temporada II)
  - name: primordial
    description: Unicidade global de NPCs Primordiais (um por mundo, por temporada)
  - name: notificacoes
    description: Web Push para reengajamento de jogadoras
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /alianca/perfil:
    post:
      operationId: registrarPerfil
      tags: [alianca]
      summary: Registrar ou atualizar perfil
      description: >
        Cria (no primeiro acesso) ou atualiza o perfil da jogadora a partir do
        id do dispositivo. Pode enviar o resumo atual da cidadela para sincronizar.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PerfilInput"
      responses:
        "200":
          description: Perfil atual
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Perfil"
  /alianca/{deviceId}/aliadas:
    get:
      operationId: listarAliadas
      tags: [alianca]
      summary: Listar as aliadas da jogadora
      parameters:
        - name: deviceId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Lista de aliadas (vazia se não houver nenhuma)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AliadasResposta"
  /alianca/desfazer:
    post:
      operationId: desfazerAlianca
      tags: [alianca]
      summary: Desfazer a aliança com uma aliada específica
      description: >
        Remove as duas direções do vínculo de aliança entre a jogadora e a
        aliada indicada. Trocas já em trânsito (empréstimos/reforços) seguem
        seu curso normalmente, pois são resolvidas por id de jogadora.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DesfazerInput"
      responses:
        "200":
          description: Aliança desfeita
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DesfazerResultado"
        "404":
          description: Aliança não encontrada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErroResposta"
  /alianca/parear:
    post:
      operationId: parearAlianca
      tags: [alianca]
      summary: Parear com outra jogadora pelo código
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PareamentoInput"
      responses:
        "200":
          description: Aliança formada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Aliada"
        "400":
          description: Requisição inválida
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErroResposta"
        "404":
          description: Código não encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErroResposta"
        "409":
          description: Já existe uma aliança
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErroResposta"
  /alianca/enviar:
    post:
      operationId: enviarRecursos
      tags: [alianca]
      summary: Enviar recursos para a aliada
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EnvioInput"
      responses:
        "200":
          description: Envio registrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvioResultado"
        "400":
          description: Requisição inválida ou limite excedido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErroResposta"
        "404":
          description: Sem aliada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErroResposta"
  /alianca/emprestar:
    post:
      operationId: emprestarMorador
      tags: [alianca]
      summary: Emprestar um morador para a aliada por um prazo
      description: >
        Remove o morador da cidadela da remetente (tratado pelo cliente) e
        cria uma troca do tipo "emprestimo" na caixa de entrada da aliada.
        Máximo de 2 empréstimos ativos simultâneos.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmprestimoInput"
      responses:
        "200":
          description: Empréstimo registrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmprestimoResultado"
        "400":
          description: Requisição inválida ou limite de empréstimos excedido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErroResposta"
        "404":
          description: Sem aliada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErroResposta"
  /alianca/devolver:
    post:
      operationId: devolverMorador
      tags: [alianca]
      summary: Devolver ao dono um morador emprestado (ou avisar sua morte)
      description: >
        Chamado pela receptora quando o prazo vence ou o morador morre.
        Operação idempotente: a transição recebido→devolvido acontece apenas uma
        vez; chamadas repetidas retornam duplicado=true sem efeito colateral.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DevolucaoInput"
      responses:
        "200":
          description: Devolução registrada (idempotente)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DevolucaoResultado"
        "404":
          description: Empréstimo de origem não encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErroResposta"
  /alianca/reforcar:
    post:
      operationId: reforcarMorador
      tags: [alianca]
      summary: Enviar um morador como reforço para a próxima expedição da aliada
      description: >
        Remove o morador da cidadela da remetente (tratado pelo cliente) e cria
        uma troca do tipo "reforco" na caixa de entrada da aliada. O morador
        participa de exatamente uma expedição e depois retorna ao dono.
        Máximo de 2 reforços ativos simultâneos.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReforcoInput"
      responses:
        "200":
          description: Reforço registrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReforcoResultado"
        "400":
          description: Requisição inválida ou limite de reforços excedido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErroResposta"
        "404":
          description: Sem aliada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErroResposta"
  /alianca/reforcar-guerra:
    post:
      operationId: reforcarMoradorGuerra
      tags: [alianca]
      summary: Enviar um morador para lutar na guerra da aliada
      description: >
        Remove o morador da cidadela da remetente (tratado pelo cliente) e cria
        uma troca do tipo "reforco_guerra" na caixa de entrada da aliada. O morador
        entra direto no front se a guerra já está ativa, ou fica ocioso até a próxima
        mobilização. Máximo de 2 reforços de guerra ativos simultâneos.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReforcoInput"
      responses:
        "200":
          description: Reforço de guerra registrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReforcoResultado"
        "400":
          description: Requisição inválida ou limite de reforços de guerra excedido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErroResposta"
        "404":
          description: Sem aliada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErroResposta"
  /alianca/pedir-ajuda:
    post:
      operationId: pedirAjudaGuerra
      tags: [alianca]
      summary: Notificar aliadas de que está em guerra
      description: >
        Cria um item do tipo "pedido_socorro" na caixa de entrada de todas as aliadas,
        sinalizando que você está em guerra e precisa de reforços. Dispara notificação
        push Tier 3 para cada aliada.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                deviceId:
                  type: string
                rivalNome:
                  type: string
                diasRestantes:
                  type: integer
              required:
                - deviceId
                - rivalNome
                - diasRestantes
      responses:
        "200":
          description: Pedido enviado
          content:
            application/json:
              schema:
                type: object
                properties:
                  enviadoPara:
                    type: integer
                required:
                  - enviadoPara
        "400":
          description: Requisição inválida
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErroResposta"
        "404":
          description: Jogadora não encontrada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErroResposta"
  /alianca/{deviceId}/caixa:
    get:
      operationId: listarCaixa
      tags: [alianca]
      summary: Listar itens pendentes na caixa de entrada
      parameters:
        - name: deviceId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Itens pendentes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaixaResposta"
  /alianca/receber:
    post:
      operationId: receberItem
      tags: [alianca]
      summary: Receber (aceitar) um item da caixa de entrada
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecebimentoInput"
      responses:
        "200":
          description: Item recebido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Recebimento"
        "404":
          description: Item não encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErroResposta"
  /guerra/rivais:
    post:
      operationId: listarRivais
      tags: [guerra]
      summary: Listar cidadelas-bot rivais próximas à força informada
      description: >
        Retorna uma seleção rotativa de cidadelas-bot cujo poder de exército está
        próximo do poder militar informado, para uma guerra justa. Sorteia entre
        as mais próximas para variar a cada atualização. Aceita uma lista de slugs
        a excluir (ex.: rival da guerra em curso).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RivaisInput"
      responses:
        "200":
          description: Rivais avistados
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RivaisResposta"
  /pioneer:
    post:
      operationId: registrarPioneer
      tags: [pioneer]
      summary: Registrar que um jogador atingiu um marco global
      description: >
        Idempotente por (deviceId, tipo). Retorna o estado global do marco e a
        posição do jogador entre os primeiros 10 (null se chegou depois).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PioneerRegistroInput"
      responses:
        "200":
          description: Registro confirmado (novo ou já existente)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PioneerRegistroResposta"
        "400":
          description: Dados inválidos
  /pioneer/{tipo}:
    get:
      operationId: consultarPioneer
      tags: [pioneer]
      summary: Consultar estado atual de um marco global
      parameters:
        - name: tipo
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/PioneerTipo"
      responses:
        "200":
          description: Estado atual do marco
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PioneerStatus"
        "400":
          description: Tipo inválido
  /primordial/{tipo}:
    get:
      operationId: consultarPrimordial
      tags: [primordial]
      summary: Verificar disponibilidade global de um primordial
      description: >
        Cada primordial é único no mundo — apenas um jogador pode possuí-lo por
        temporada. claimedByMe indica se o claim existente pertence ao deviceId informado.
      parameters:
        - name: tipo
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/PrimordialTipo"
        - name: deviceId
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Disponibilidade do primordial
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrimordialStatus"
        "400":
          description: Tipo inválido
  /primordial/claim:
    post:
      operationId: reivindicarPrimordial
      tags: [primordial]
      summary: Reivindicar um primordial para um deviceId
      description: Idempotente para o mesmo deviceId. 409 se outro jogador já reivindicou.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PrimordialClaimInput"
      responses:
        "200":
          description: Primordial reivindicado (novo ou idempotente)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrimordialClaimResposta"
        "400":
          description: Dados inválidos
        "409":
          description: Primordial já reivindicado por outro jogador
  /primordial/claims/mine:
    delete:
      operationId: liberarPrimordiais
      tags: [primordial]
      summary: Liberar todos os primordiais reivindicados por um device
      description: Chamado ao iniciar um novo jogo. Idempotente.
      parameters:
        - name: deviceId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Claims liberados
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrimordialReleaseResposta"
        "400":
          description: deviceId obrigatório
  /notificacoes/chave-publica:
    get:
      operationId: obterChavePublicaVapid
      tags: [notificacoes]
      summary: Obter chave pública VAPID para Web Push
      description: Retorna a chave pública VAPID necessária para inscrever o cliente em notificações push.
      responses:
        "200":
          description: Chave pública VAPID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChavePublicaVapid"
        "503":
          description: Notificações não configuradas
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErroResposta"
  /notificacoes/inscrever:
    post:
      operationId: inscreverNotificacoes
      tags: [notificacoes]
      summary: Inscrever dispositivo em notificações push
      description: Registra uma assinatura de push para o dispositivo. Upsert por deviceId.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InscricaoPushInput"
      responses:
        "200":
          description: Inscrição bem-sucedida
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResposta"
  /notificacoes/desinscrever:
    post:
      operationId: desinscreverNotificacoes
      tags: [notificacoes]
      summary: Desinscrever dispositivo de notificações push
      description: Remove a assinatura de push do dispositivo.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DesinscricaoInput"
      responses:
        "200":
          description: Desinscrita bem-sucedida
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResposta"
  /notificacoes/proximo-evento:
    patch:
      operationId: atualizarProximoEvento
      tags: [notificacoes]
      summary: Atualizar próximo evento para notificação Tier 2
      description: >
        Define o próximo evento relevante (e quando ocorrerá) para uma notificação personalizada.
        Envie null em ambos os campos para limpar.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProximoEventoInput"
      responses:
        "200":
          description: Próximo evento atualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResposta"
        "404":
          description: Nenhuma assinatura encontrada para este deviceId
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErroResposta"
components:
  schemas:
    PioneerTipo:
      type: string
      enum: [andar_20]
    PioneerRegistroInput:
      type: object
      properties:
        deviceId:
          type: string
        nome:
          type: string
        tipo:
          $ref: "#/components/schemas/PioneerTipo"
      required:
        - deviceId
        - nome
        - tipo
    PioneerStatus:
      type: object
      properties:
        total:
          type: number
        desbloqueado:
          type: boolean
        nomes:
          type: array
          items:
            type: string
      required:
        - total
        - desbloqueado
        - nomes
    PioneerRegistroResposta:
      type: object
      properties:
        novo:
          type: boolean
        posicao:
          type: ["number", "null"]
        total:
          type: number
        desbloqueado:
          type: boolean
        nomes:
          type: array
          items:
            type: string
      required:
        - novo
        - posicao
        - total
        - desbloqueado
        - nomes
    PrimordialTipo:
      type: string
      enum: [primordial_t1, primordial_t2, primordial_t3]
    PrimordialStatus:
      type: object
      properties:
        disponivel:
          type: boolean
        claimedByMe:
          type: boolean
      required:
        - disponivel
        - claimedByMe
    PrimordialClaimInput:
      type: object
      properties:
        tipo:
          $ref: "#/components/schemas/PrimordialTipo"
        deviceId:
          type: string
      required:
        - tipo
        - deviceId
    PrimordialClaimResposta:
      type: object
      properties:
        claimed:
          type: boolean
        mine:
          type: boolean
      required:
        - claimed
        - mine
    PrimordialReleaseResposta:
      type: object
      properties:
        released:
          type: boolean
      required:
        - released
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    ErroResposta:
      type: object
      properties:
        error:
          type: string
      required:
        - error
    Recursos:
      type: object
      properties:
        comida:
          type: integer
        madeira:
          type: integer
        pedra:
          type: integer
        ferro:
          type: integer
      required:
        - comida
        - madeira
        - pedra
        - ferro
    ResumoProfissoes:
      type: object
      properties:
        combatente:
          type: integer
        batedor:
          type: integer
        erudito:
          type: integer
        sentinela:
          type: integer
      required:
        - combatente
        - batedor
        - erudito
        - sentinela
    ResumoCidadela:
      type: object
      properties:
        dia:
          type: integer
        populacao:
          type: integer
        andarAtual:
          type: integer
        profissoes:
          $ref: "#/components/schemas/ResumoProfissoes"
        emGuerra:
          type: boolean
        guerraRivalNome:
          type: ["string", "null"]
        guerraDiasRestantes:
          type: ["integer", "null"]
      required:
        - dia
        - populacao
        - andarAtual
        - profissoes
        - emGuerra
        - guerraRivalNome
        - guerraDiasRestantes
    PerfilInput:
      type: object
      properties:
        deviceId:
          type: string
        nome:
          type: string
        resumo:
          $ref: "#/components/schemas/ResumoCidadela"
      required:
        - deviceId
    Perfil:
      type: object
      properties:
        deviceId:
          type: string
        nome:
          type: string
        codigoAlianca:
          type: string
        temAliada:
          type: boolean
        numAliadas:
          type: integer
        maxAliadas:
          type: integer
        limiteEnvioDiario:
          type: integer
        enviadoHoje:
          type: integer
        taxaTorre:
          type: number
      required:
        - deviceId
        - nome
        - codigoAlianca
        - temAliada
        - numAliadas
        - maxAliadas
        - limiteEnvioDiario
        - enviadoHoje
        - taxaTorre
    AliadasResposta:
      type: array
      items:
        $ref: "#/components/schemas/Aliada"
    DesfazerInput:
      type: object
      properties:
        deviceId:
          type: string
        aliadaDeviceId:
          type: string
      required:
        - deviceId
        - aliadaDeviceId
    DesfazerResultado:
      type: object
      properties:
        ok:
          type: boolean
      required:
        - ok
    Aliada:
      type: object
      properties:
        deviceId:
          type: string
        nome:
          type: string
        codigoAlianca:
          type: string
        resumo:
          oneOf:
            - $ref: "#/components/schemas/ResumoCidadela"
            - type: "null"
        atualizadoEm:
          type: ["string", "null"]
          format: date-time
      required:
        - deviceId
        - nome
        - codigoAlianca
        - resumo
        - atualizadoEm
    PareamentoInput:
      type: object
      properties:
        deviceId:
          type: string
        codigo:
          type: string
      required:
        - deviceId
        - codigo
    EnvioInput:
      type: object
      properties:
        deviceId:
          type: string
        aliadaDeviceId:
          type: string
        recursos:
          $ref: "#/components/schemas/Recursos"
      required:
        - deviceId
        - aliadaDeviceId
        - recursos
    EnvioResultado:
      type: object
      properties:
        enviado:
          $ref: "#/components/schemas/Recursos"
        recebidoPelaAliada:
          $ref: "#/components/schemas/Recursos"
        taxaTorre:
          type: number
        restanteHoje:
          type: integer
      required:
        - enviado
        - recebidoPelaAliada
        - taxaTorre
        - restanteHoje
    Exchange:
      type: object
      properties:
        id:
          type: integer
        tipo:
          type: string
        remetenteNome:
          type: string
        # Presente apenas para tipo="recursos"
        recursos:
          oneOf:
            - $ref: "#/components/schemas/Recursos"
            - type: "null"
        # Presente para tipo="emprestimo" e "retorno"
        morador:
          oneOf:
            - $ref: "#/components/schemas/Morador"
            - type: "null"
        prazoDias:
          type: ["integer", "null"]
