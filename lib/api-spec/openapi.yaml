openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: alianca
    description: Aliança assíncrona entre jogadoras (identidade, pareamento e trocas)
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /alianca/perfil:
    post:
      operationId: registrarPerfil
      tags: [alianca]
      summary: Registrar ou atualizar perfil
      description: >
        Cria (no primeiro acesso) ou atualiza o perfil da jogadora a partir do
        id do dispositivo. Pode enviar o resumo atual da cidadela para sincronizar.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PerfilInput"
      responses:
        "200":
          description: Perfil atual
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Perfil"
  /alianca/{deviceId}/aliadas:
    get:
      operationId: listarAliadas
      tags: [alianca]
      summary: Listar as aliadas da jogadora
      parameters:
        - name: deviceId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Lista de aliadas (vazia se não houver nenhuma)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AliadasResposta"
  /alianca/desfazer:
    post:
      operationId: desfazerAlianca
      tags: [alianca]
      summary: Desfazer a aliança com uma aliada específica
      description: >
        Remove as duas direções do vínculo de aliança entre a jogadora e a
        aliada indicada. Trocas já em trânsito (empréstimos/reforços) seguem
        seu curso normalmente, pois são resolvidas por id de jogadora.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DesfazerInput"
      responses:
        "200":
          description: Aliança desfeita
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DesfazerResultado"
        "404":
          description: Aliança não encontrada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErroResposta"
  /alianca/parear:
    post:
      operationId: parearAlianca
      tags: [alianca]
      summary: Parear com outra jogadora pelo código
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PareamentoInput"
      responses:
        "200":
          description: Aliança formada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Aliada"
        "400":
          description: Requisição inválida
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErroResposta"
        "404":
          description: Código não encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErroResposta"
        "409":
          description: Já existe uma aliança
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErroResposta"
  /alianca/enviar:
    post:
      operationId: enviarRecursos
      tags: [alianca]
      summary: Enviar recursos para a aliada
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EnvioInput"
      responses:
        "200":
          description: Envio registrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvioResultado"
        "400":
          description: Requisição inválida ou limite excedido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErroResposta"
        "404":
          description: Sem aliada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErroResposta"
  /alianca/emprestar:
    post:
      operationId: emprestarMorador
      tags: [alianca]
      summary: Emprestar um morador para a aliada por um prazo
      description: >
        Remove o morador da cidadela da remetente (tratado pelo cliente) e
        cria uma troca do tipo "emprestimo" na caixa de entrada da aliada.
        Máximo de 2 empréstimos ativos simultâneos.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmprestimoInput"
      responses:
        "200":
          description: Empréstimo registrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmprestimoResultado"
        "400":
          description: Requisição inválida ou limite de empréstimos excedido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErroResposta"
        "404":
          description: Sem aliada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErroResposta"
  /alianca/devolver:
    post:
      operationId: devolverMorador
      tags: [alianca]
      summary: Devolver ao dono um morador emprestado (ou avisar sua morte)
      description: >
        Chamado pela receptora quando o prazo vence ou o morador morre.
        Operação idempotente: a transição recebido→devolvido acontece apenas uma
        vez; chamadas repetidas retornam duplicado=true sem efeito colateral.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DevolucaoInput"
      responses:
        "200":
          description: Devolução registrada (idempotente)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DevolucaoResultado"
        "404":
          description: Empréstimo de origem não encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErroResposta"
  /alianca/reforcar:
    post:
      operationId: reforcarMorador
      tags: [alianca]
      summary: Enviar um morador como reforço para a próxima expedição da aliada
      description: >
        Remove o morador da cidadela da remetente (tratado pelo cliente) e cria
        uma troca do tipo "reforco" na caixa de entrada da aliada. O morador
        participa de exatamente uma expedição e depois retorna ao dono.
        Máximo de 2 reforços ativos simultâneos.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReforcoInput"
      responses:
        "200":
          description: Reforço registrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReforcoResultado"
        "400":
          description: Requisição inválida ou limite de reforços excedido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErroResposta"
        "404":
          description: Sem aliada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErroResposta"
  /alianca/{deviceId}/caixa:
    get:
      operationId: listarCaixa
      tags: [alianca]
      summary: Listar itens pendentes na caixa de entrada
      parameters:
        - name: deviceId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Itens pendentes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaixaResposta"
  /alianca/receber:
    post:
      operationId: receberItem
      tags: [alianca]
      summary: Receber (aceitar) um item da caixa de entrada
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecebimentoInput"
      responses:
        "200":
          description: Item recebido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Recebimento"
        "404":
          description: Item não encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErroResposta"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    ErroResposta:
      type: object
      properties:
        error:
          type: string
      required:
        - error
    Recursos:
      type: object
      properties:
        comida:
          type: integer
        madeira:
          type: integer
        pedra:
          type: integer
        ferro:
          type: integer
      required:
        - comida
        - madeira
        - pedra
        - ferro
    ResumoProfissoes:
      type: object
      properties:
        combatente:
          type: integer
        batedor:
          type: integer
        erudito:
          type: integer
        sentinela:
          type: integer
      required:
        - combatente
        - batedor
        - erudito
        - sentinela
    ResumoCidadela:
      type: object
      properties:
        dia:
          type: integer
        populacao:
          type: integer
        andarAtual:
          type: integer
        profissoes:
          $ref: "#/components/schemas/ResumoProfissoes"
      required:
        - dia
        - populacao
        - andarAtual
        - profissoes
    PerfilInput:
      type: object
      properties:
        deviceId:
          type: string
        nome:
          type: string
        resumo:
          $ref: "#/components/schemas/ResumoCidadela"
      required:
        - deviceId
    Perfil:
      type: object
      properties:
        deviceId:
          type: string
        nome:
          type: string
        codigoAlianca:
          type: string
        temAliada:
          type: boolean
        numAliadas:
          type: integer
        maxAliadas:
          type: integer
        limiteEnvioDiario:
          type: integer
        enviadoHoje:
          type: integer
        taxaTorre:
          type: number
      required:
        - deviceId
        - nome
        - codigoAlianca
        - temAliada
        - numAliadas
        - maxAliadas
        - limiteEnvioDiario
        - enviadoHoje
        - taxaTorre
    AliadasResposta:
      type: array
      items:
        $ref: "#/components/schemas/Aliada"
    DesfazerInput:
      type: object
      properties:
        deviceId:
          type: string
        aliadaDeviceId:
          type: string
      required:
        - deviceId
        - aliadaDeviceId
    DesfazerResultado:
      type: object
      properties:
        ok:
          type: boolean
      required:
        - ok
    Aliada:
      type: object
      properties:
        deviceId:
          type: string
        nome:
          type: string
        codigoAlianca:
          type: string
        resumo:
          oneOf:
            - $ref: "#/components/schemas/ResumoCidadela"
            - type: "null"
        atualizadoEm:
          type: ["string", "null"]
          format: date-time
      required:
        - deviceId
        - nome
        - codigoAlianca
        - resumo
        - atualizadoEm
    PareamentoInput:
      type: object
      properties:
        deviceId:
          type: string
        codigo:
          type: string
      required:
        - deviceId
        - codigo
    EnvioInput:
      type: object
      properties:
        deviceId:
          type: string
        aliadaDeviceId:
          type: string
        recursos:
          $ref: "#/components/schemas/Recursos"
      required:
        - deviceId
        - aliadaDeviceId
        - recursos
    EnvioResultado:
      type: object
      properties:
        enviado:
          $ref: "#/components/schemas/Recursos"
        recebidoPelaAliada:
          $ref: "#/components/schemas/Recursos"
        taxaTorre:
          type: number
        restanteHoje:
          type: integer
      required:
        - enviado
        - recebidoPelaAliada
        - taxaTorre
        - restanteHoje
    Exchange:
      type: object
      properties:
        id:
          type: integer
        tipo:
          type: string
        remetenteNome:
          type: string
        # Presente apenas para tipo="recursos"
        recursos:
          oneOf:
            - $ref: "#/components/schemas/Recursos"
            - type: "null"
        # Presente para tipo="emprestimo" e "retorno"
        morador:
          oneOf:
            - $ref: "#/components/schemas/Morador"
            - type: "null"
        prazoDias:
          type: ["integer", "null"]
        morreu:
          type: boolean
        status:
          type: string
        criadoEm:
          type: string
          format: date-time
      required:
        - id
        - tipo
        - remetenteNome
        - status
        - criadoEm
    CaixaResposta:
      type: array
      items:
        $ref: "#/components/schemas/Exchange"
    RecebimentoInput:
      type: object
      properties:
        deviceId:
          type: string
        exchangeId:
          type: integer
      required:
        - deviceId
        - exchangeId
    Recebimento:
      type: object
      properties:
        id:
          type: integer
        tipo:
          type: string
        remetenteNome:
          type: string
        # Preenchido para tipo="recursos"
        recursos:
          oneOf:
            - $ref: "#/components/schemas/Recursos"
            - type: "null"
        # Preenchido para tipo="emprestimo" e "retorno"
        morador:
          oneOf:
            - $ref: "#/components/schemas/Morador"
            - type: "null"
        prazoDias:
          type: ["integer", "null"]
        morreu:
          type: boolean
      required:
        - id
        - tipo
        - remetenteNome
    Morador:
      type: object
      properties:
        id:
          type: string
        nome:
          type: string
        forca:
          type: integer
        agilidade:
          type: integer
        inteligencia:
          type: integer
        resistencia:
          type: integer
        sanidade:
          type: number
        lealdade:
          type: number
        fadiga:
          type: number
        vivo:
          type: boolean
        obscuro:
          type: boolean
        emExpedicao:
          type: boolean
        raridade:
          type: string
        habilidade:
          type: string
        posto:
          type: ["string", "null"]
      required:
        - id
        - nome
        - forca
        - agilidade
        - inteligencia
        - resistencia
        - sanidade
        - lealdade
        - fadiga
        - vivo
        - obscuro
        - emExpedicao
        - raridade
        - habilidade
        - posto
    EmprestimoInput:
      type: object
      properties:
        deviceId:
          type: string
        aliadaDeviceId:
          type: string
        morador:
          $ref: "#/components/schemas/Morador"
        prazoDias:
          type: integer
      required:
        - deviceId
        - aliadaDeviceId
        - morador
        - prazoDias
    EmprestimoResultado:
      type: object
      properties:
        id:
          type: integer
        prazoDias:
          type: integer
        emprestimosAtivos:
          type: integer
        limiteEmprestimos:
          type: integer
      required:
        - id
        - prazoDias
        - emprestimosAtivos
        - limiteEmprestimos
    DevolucaoInput:
      type: object
      properties:
        deviceId:
          type: string
        origemExchangeId:
          type: integer
        morador:
          $ref: "#/components/schemas/Morador"
        morreu:
          type: boolean
      required:
        - deviceId
        - origemExchangeId
        - morador
        - morreu
    DevolucaoResultado:
      type: object
      properties:
        ok:
          type: boolean
        duplicado:
          type: boolean
      required:
        - ok
        - duplicado
    ReforcoInput:
      type: object
      properties:
        deviceId:
          type: string
        aliadaDeviceId:
          type: string
        morador:
          $ref: "#/components/schemas/Morador"
      required:
        - deviceId
        - aliadaDeviceId
        - morador
    ReforcoResultado:
      type: object
      properties:
        id:
          type: integer
        reforcosAtivos:
          type: integer
        limiteReforcos:
          type: integer
      required:
        - id
        - reforcosAtivos
        - limiteReforcos
